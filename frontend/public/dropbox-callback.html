<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Dropbox · Marvex Studio</title>
  <style>
    html, body { margin: 0; padding: 0; background: #070b1c; color: #d6e3f5; font-family: system-ui, sans-serif; height: 100vh; display: flex; align-items: center; justify-content: center; }
    .card { max-width: 320px; padding: 24px; text-align: center; border: 1px solid rgba(0,240,255,0.28); border-radius: 16px; background: rgba(10,15,36,0.6); backdrop-filter: blur(10px); }
    h1 { font-size: 14px; letter-spacing: 0.22em; text-transform: uppercase; color: #36e6ff; margin: 0 0 8px 0; font-weight: 600; }
    p { font-size: 12px; color: #9aaad0; margin: 4px 0; }
    .err { color: #ff7ab6; }
  </style>
</head>
<body>
  <div class="card">
    <h1 id="heading">Connecting Dropbox</h1>
    <p id="msg">Finishing sign-in…</p>
    <p id="detail" style="font-size: 10px; opacity: 0.6;"></p>
  </div>
  <script>
    (function () {
      var params = new URL(window.location.href).searchParams;
      var code = params.get("code");
      var state = params.get("state");
      var error = params.get("error") || params.get("error_description");
      var heading = document.getElementById("heading");
      var msg = document.getElementById("msg");
      var detail = document.getElementById("detail");

      function notifyAndClose(payload) {
        try {
          if (window.opener) {
            window.opener.postMessage(payload, window.location.origin);
          }
        } catch (e) {
          // silent — opener may be gone
        }
        setTimeout(function () { try { window.close(); } catch (e) {} }, 800);
      }

      if (error) {
        heading.textContent = "Sign-in cancelled";
        heading.className = "err";
        msg.textContent = "You can close this window.";
        detail.textContent = String(error).slice(0, 100);
        notifyAndClose({ type: "mindmapper:dropbox-oauth", error: String(error) });
      } else if (code) {
        msg.textContent = "Signed in. Returning to Marvex Studio…";
        notifyAndClose({ type: "mindmapper:dropbox-oauth", code: code, state: state });
      } else {
        heading.textContent = "Unexpected response";
        heading.className = "err";
        msg.textContent = "No code returned. You can close this window.";
      }
    })();
  </script>
</body>
</html>
