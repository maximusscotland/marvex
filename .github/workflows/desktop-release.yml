name: desktop-release

# When this runs:
#   • push of a `v*` tag (e.g. `v1.0.0`)        → build, sign, publish to GitHub Releases
#   • manual click of "Run workflow" in GitHub  → build only, no publish (dry-run)
#
# Required repo secrets (Settings → Secrets and variables → Actions):
#
#   --- macOS signing & notarisation (all 5 must be set together) ---
#   APPLE_ID                       Apple ID email (e.g. you@example.com)
#   APPLE_APP_SPECIFIC_PASSWORD    App-specific password from appleid.apple.com
#                                  (NOT your Apple ID password — generate one
#                                  in Sign-In & Security → App-Specific Passwords)
#   APPLE_TEAM_ID                  10-char team ID (developer.apple.com → Membership)
#   MAC_CERTS                      Base64-encoded `.p12` of your Developer ID
#                                  Application certificate exported from Keychain
#   MAC_CERTS_PASSWORD             Password you set when exporting the .p12
#
#   How to make MAC_CERTS without owning a Mac:
#     1. Trial MacInCloud / Scaleway Apple Silicon for ~5 minutes (~$1).
#     2. Open Keychain Access → Certificate Assistant →
#        "Request a Certificate from a CA" → save .certSigningRequest.
#     3. Apple Developer portal → Certificates → "+" →
#        "Developer ID Application" → upload the .certSigningRequest →
#        download the .cer.
#     4. Double-click the .cer in Keychain → expand it → right-click the
#        private key → Export → save as developer-id.p12 with a password.
#     5. Base64-encode it: `base64 -i developer-id.p12 | pbcopy`
#     6. Paste into the MAC_CERTS GitHub secret; password into MAC_CERTS_PASSWORD.
#
#   --- Windows code-signing (all 2 must be set together) ---
#   WIN_CSC_LINK                   Base64-encoded `.pfx` code-signing cert.
#                                  Cheapest options: Certum Open Source
#                                  Code Signing (~€26/yr, requires public
#                                  GitHub repo — which you have) or SSL.com
#                                  EV Code Signing (~$199/yr, instant SmartScreen
#                                  reputation, requires hardware token).
#   WIN_CSC_KEY_PASSWORD           Password you set when exporting the .pfx
#
#   When either bundle is missing, the matching OS still builds — just
#   unsigned. This is intentional: it lets you ship now and switch on
#   signing later without a workflow edit.

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write   # needed so electron-builder can create a Release + upload assets

jobs:
  release:
    strategy:
      fail-fast: false
      matrix:
        os: [macos-latest, windows-latest, ubuntu-latest]

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version: 20
          cache: yarn
          cache-dependency-path: |
            frontend/yarn.lock
            desktop/yarn.lock

      # Use --frozen-lockfile first for reproducibility; if the lockfile
      # has drifted (legit possibility on a long-lived repo), fall back
      # to a regular install so a one-off mismatch doesn't gate the
      # release. The fallback regenerates yarn.lock locally on the
      # runner, which is then thrown away when the job ends — so the
      # committed lockfile in git is the source of truth on the NEXT
      # run. Practical: ship the release now, fix the lockfile drift
      # in a follow-up commit.
      - name: Install frontend deps
        run: yarn install --frozen-lockfile || yarn install
        working-directory: ./frontend

      - name: Install desktop deps
        run: yarn install --frozen-lockfile || yarn install
        working-directory: ./desktop

      - name: Build renderer
        env:
          REACT_APP_BACKEND_URL: https://marvex.app
        run: yarn build:renderer
        working-directory: ./desktop

      # On a tag push (`v1.0.0`) we publish to GitHub Releases. On a manual
      # `workflow_dispatch` we only build artifacts so you can sanity-check
      # without burning a release tag.
      #
      # Tags ending in `-beta`, `-rc`, `-alpha`, or containing `-preview` are
      # treated as PRE-RELEASES. GitHub doesn't auto-flag these as "Latest",
      # so `mind-mapper.com/download` (which follows /releases/latest) keeps
      # pointing at the last stable build. Perfect for sharing betas with
      # a handful of testers without exposing them to the public.
      #
      # Why the `-c.publish.provider=generic ...` block on dry-runs?
      # electron-builder auto-detects the github remote and injects a github
      # publisher whenever it sees a github repo — even when --publish never.
      # Then in v25.x there's a bug where computeChannelNames crashes with
      # "Cannot read properties of null (reading 'channel')" because we
      # build from a non-tagged commit (no `latest` channel context).
      # Forcing a benign generic provider on dry-runs sidesteps both issues:
      # auto-detection is skipped, channel resolves to the explicit `latest`,
      # builds succeed, no real upload happens (--publish never).
      # Build flag — always `--publish never`.
      # We OWN the upload via softprops/action-gh-release (further down).
      # Letting electron-builder's GitHub publisher do the upload was the
      # source of every "release exists but Assets is empty" bug we hit:
      # it would build the binaries, then crash in
      # `getResolvedPublishConfig` before attaching them.
      #
      # Using a benign generic publisher config keeps electron-builder
      # happy (it auto-injects a github publisher otherwise that
      # auto-runs even with --publish never), without actually firing.
      - name: Pick publish flag
        id: flag
        shell: bash
        run: |
          echo "value=--publish never -c.publish.provider=generic -c.publish.url=https://marvex.app/updates -c.publish.channel=latest" >> "$GITHUB_OUTPUT"

      - name: Build & publish (macOS)
        if: matrix.os == 'macos-latest'
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # Apple signing/notarisation env. ALL FOUR vars must be set
          # for electron-builder to attempt code-signing — if any one is
          # missing/empty, electron-builder skips signing & notarisation
          # entirely and produces an unsigned .dmg.  This lets us ship
          # immediately while we sort out the Apple Developer cert
          # dance, and start signing automatically the moment the
          # secrets exist (no workflow edit needed).
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          CSC_LINK: ${{ secrets.MAC_CERTS }}
          CSC_KEY_PASSWORD: ${{ secrets.MAC_CERTS_PASSWORD }}
          # When CSC_LINK is empty, electron-builder still attempts to
          # use any "Developer ID" identity from the macOS Keychain.
          # The CI runner has none, so we must explicitly tell it to
          # skip signing instead of failing the build.
          CSC_IDENTITY_AUTO_DISCOVERY: ${{ secrets.MAC_CERTS != '' && 'true' || 'false' }}
        run: yarn electron-builder --mac ${{ steps.flag.outputs.value }} ${{ secrets.MAC_CERTS == '' && '-c.mac.identity=null -c.mac.notarize=false' || '' }}
        working-directory: ./desktop

      - name: Build & publish (Windows)
        if: matrix.os == 'windows-latest'
        # Force bash so PowerShell doesn't split `-c.publish.provider=generic`
        # into two args (`-c` + `.publish.provider=...`), which tricks
        # electron-builder into treating the latter as a config FILE PATH
        # and crashing with ENOENT. Git Bash is preinstalled on
        # windows-latest runners.
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # Optional Windows signing — auto-enables when both secrets exist,
          # falls back to unsigned otherwise. electron-builder picks these
          # up by name; no config change needed in package.json.
          CSC_LINK: ${{ secrets.WIN_CSC_LINK }}
          CSC_KEY_PASSWORD: ${{ secrets.WIN_CSC_KEY_PASSWORD }}
        run: yarn electron-builder --win ${{ steps.flag.outputs.value }}
        working-directory: ./desktop

      - name: Build & publish (Linux)
        if: matrix.os == 'ubuntu-latest'
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: yarn electron-builder --linux ${{ steps.flag.outputs.value }}
        working-directory: ./desktop

      # Belt-and-braces release uploader. electron-builder's own GitHub
      # publisher is fragile — it computes channels and release types
      # via app-builder-lib's internal heuristics that break on edge
      # cases (private tokens, v0.x semver, draft vs release flags…).
      # When that fails, we end up with binaries built but unattached.
      #
      # This step ignores electron-builder's publisher entirely and
      # uploads every artifact in `desktop/dist/` directly to the tag's
      # GitHub Release via softprops/action-gh-release, which is the
      # community-standard, battle-tested release uploader. It creates
      # the release if it doesn't exist, ensures the prerelease flag
      # matches the tag (stable tag → stable release), and is
      # idempotent (re-running just re-attaches the same files).
      #
      # Runs only on tag pushes — manual dispatch keeps the existing
      # 14-day-artifact dry-run path below.
      - name: Attach binaries to GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          # If your tag is `v0.1.2-beta`, mark it as a prerelease.
          # For plain `vX.Y.Z`, it's a stable release.
          prerelease: ${{ contains(github.ref, '-beta') || contains(github.ref, '-rc') || contains(github.ref, '-alpha') || contains(github.ref, '-preview') }}
          # `make_latest: legacy` lets the latest non-prerelease tag
          # claim the /releases/latest URL automatically.
          make_latest: legacy
          fail_on_unmatched_files: false
          files: |
            desktop/dist/*.exe
            desktop/dist/*.dmg
            desktop/dist/*.zip
            desktop/dist/*.AppImage
            desktop/dist/*.deb
            desktop/dist/*.rpm
            desktop/dist/*.blockmap
            desktop/dist/latest*.yml

      # Dry-run uploads: when triggered manually (no tag), keep the binaries
      # for 14 days as workflow artifacts so you can download + smoke-test
      # them without cutting a public release.
      - name: Upload dry-run artifacts
        if: ${{ !startsWith(github.ref, 'refs/tags/v') }}
        uses: actions/upload-artifact@v4
        with:
          name: marvex-${{ runner.os }}
          path: |
            desktop/dist/*.exe
            desktop/dist/*.dmg
            desktop/dist/*.zip
            desktop/dist/*.AppImage
            desktop/dist/*.deb
            desktop/dist/*.rpm
            desktop/dist/*.blockmap
            desktop/dist/latest*.yml
          if-no-files-found: ignore
          retention-days: 14
