<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8" />
  <title>Mind-Mapper — Options</title>
  <link rel="stylesheet" href="popup.css" />
  <style>
    body { width: 380px; }
    label { font-size: 10px; text-transform: uppercase; letter-spacing: 0.22em; color: #9aa7c7; font-family: "SF Mono", ui-monospace, Menlo, monospace; display: block; margin-bottom: 6px; }
    input {
      width: 100%;
      background: #0a0f24;
      border: 1px solid rgba(255, 255, 255, 0.1);
      color: #cfdaf3;
      border-radius: 8px;
      padding: 10px 12px;
      font-size: 13px;
      font-family: "SF Mono", ui-monospace, Menlo, monospace;
    }
    input:focus { outline: none; border-color: #00f0ff88; }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="brand">
      <div class="dot"></div>
      <div class="brand-text">
        <div class="brand-name">Mind-Mapper Clip</div>
        <div class="brand-sub">Options</div>
      </div>
    </div>

    <div class="card">
      <label for="host">Mind-Mapper host</label>
      <input id="host" type="url" placeholder="https://mind-mapper.com" />
    </div>

    <button id="save" class="primary">
      <span>Save</span>
    </button>

    <div id="status" class="status"></div>

    <div class="footnote">
      Leave blank to use the default <b>https://mind-mapper.com</b>. Change this if you're running your own server or testing against a staging URL.
    </div>
  </div>

  <script src="options.js"></script>
</body>
</html>
